<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forms Exercise</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
<div class="container">
    <div class="visual-side">
        <img class="back-img" src="alisonupdyke-cow.jpg" 
            alt="cows in a flower field on a mountain photographed by Alison Updyke">
        <div class="visual">
            <img class="logo" src="odin-lined.png" alt="logo odin">
            <div class="back-color"></div>
        </div>
        <div class="visual" class="credit">Photo by Alison Updyke</div>
    </div>
    <div class="form-side">
        <header>
            <h1 class="quote">This is not a real online service! You know you need something like 
            this in your life to help you realize your deepest dreams. Sign up now to get started.</h>
            <h1 class="quote"> You know you want to.</h1>
        </header>
  
        <form class="signup-form" action="" method="get" class="form-one">
            <div class="title">Let's do this!</div>
            <div class="form-section">
                <div class="section-one">
                    <div class="form-one">
                        <label for="first-name">First name</label>
                        <input type="text" name="first-name" id="first-name">
                    </div>
                    <div class="form-one">
                        <label for="email">Email</label>
                        <input type="email" name="email" id="email">
                    </div>
                    <div class="form-one">
                        <label for="password">Password</label>
                        <input type="password" name="password" id="password">
                    </div>
                </div>
                <div class="section-one">
                    <div class="form-one">
                        <label for="last-name">Last name</label>
                        <input type="text" name="last-name" id="last-name">
                    </div>
                    <div class="form-one">
                        <label for="phone-number">Phone number</label>
                        <input type="number" name="phone-number" id="phone-number">
                    </div>
                    <div class="form-one">
                        <label for="confirm-password">Confirm password</label>
                        <input type="password" name="confirm-password" id="confirm-password">
                    </div>
                </div>
            </div>
        </form> 
        <div class="create-account">
            <button type="submit"> Create Account</button>
            <div class="login">Already have an account? Log in</div>
        </div>
    </div>
</div>
</body>
</html>
